name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-lint-test:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.0"

      - name: Get bun cache directory
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache rm -p && bun pm cache mkdir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.bun-cache-dir.outputs.dir }}
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify scripts exist
        run: |
          bun run --help 2>/dev/null || true
          echo "Checking required scripts..."
          cat package.json | grep -q '"typecheck"' && echo "✓ typecheck exists" || echo "✗ typecheck missing"
          cat package.json | grep -q '"lint"' && echo "✓ lint exists" || echo "✗ lint missing"
          cat package.json | grep -q '"test"' && echo "✓ test exists" || echo "✗ test missing"

      - name: Run type check
        run: bun run typecheck

      - name: Run Biome linter
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI 检查失败！\n\n请查看 [Actions 日志](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 了解详情。'
            })
