name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-lint-test:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Get bun cache directory
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.bun-cache-dir.outputs.dir }}
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache hit status
        run: echo "Cache hit or restore? ${{ steps.cache-deps.outputs.cache-hit }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify scripts exist
        run: |
          node -e "const p=require('./package.json'); ['typecheck','lint','test'].forEach(s=>{if(!p.scripts?.[s]) throw new Error(s+' missing')})"
          echo "✓ All required scripts exist (typecheck, lint, test)"

      - name: Run type check
        run: bun run typecheck

      - name: Run Biome linter
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI 检查失败！\n\n请查看 [Actions 日志](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 了解详情。'
            })
